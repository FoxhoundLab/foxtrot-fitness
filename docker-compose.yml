version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: foxtrot-postgres
    environment:
      POSTGRES_USER: foxtrot
      POSTGRES_PASSWORD: foxtrot_dev
      POSTGRES_DB: foxtrot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtrot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: foxtrot-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://foxtrot:foxtrot_dev@postgres:5432/foxtrot
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: